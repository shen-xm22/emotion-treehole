<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 树洞情绪站</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sage:      #8B9D8B;
      --sage-lt:   #C4D3C4;
      --sage-pt:   #E8F0E8;
      --rose:      #E8C4C8;
      --rose-lt:   #F5E4E6;
      --brown:     #5D4E37;
      --brown-lt:  #8B7D6A;
      --cream:     #FDFBF9;
      --shadow:    0 8px 32px rgba(93,78,55,0.10);
      --transition: 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    html { height: 100%; }
    body {
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(175deg, #F6F0E8 0%, #EDE8DA 18%, #E0E1CF 38%, #D1D7C2 55%, #C2CEB3 72%, #B6C5A6 85%, #AEBFA0 100%);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brown);
      padding: 24px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: -60% -40%;
      background: radial-gradient(ellipse at 30% 15%, rgba(255,236,210,0.28) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: rgba(253,251,249,0.93);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: 0 16px 48px rgba(93,78,55,0.12);
      border: 1px solid rgba(139,157,139,0.10);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo a {
      text-decoration: none;
      color: var(--brown);
      font-size: 20px;
      font-weight: 600;
      font-family: 'Quicksand','Noto Sans SC',sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .auth-logo a:hover { color: var(--sage); }

    .tabs {
      display: flex;
      background: var(--sage-pt);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      color: var(--brown-lt);
      border: none;
      background: transparent;
      font-family: inherit;
    }
    .tab.active {
      background: #fff;
      color: var(--brown);
      box-shadow: 0 2px 8px rgba(93,78,55,0.06);
    }
    .tab:hover:not(.active) { color: var(--brown); }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--brown-lt);
      margin-bottom: 6px;
    }
    .form-group .input-wrap {
      position: relative;
    }
    .form-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.5;
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid rgba(139,157,139,0.20);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      background: rgba(255,255,255,0.7);
      color: var(--brown);
      transition: var(--transition);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(139,157,139,0.12);
      background: #fff;
    }
    .form-group input::placeholder { color: rgba(139,125,106,0.4); }

    .form-error {
      color: #D47A84;
      font-size: 13px;
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .form-error.show { display: flex; }

    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 4px 0 12px;
      font-size: 13px;
      color: var(--brown);
      line-height: 1.5;
    }
    .terms-checkbox input[type="checkbox"] {
      margin-top: 3px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      accent-color: var(--sage);
      cursor: pointer;
    }
    .terms-checkbox a {
      color: var(--sage);
      text-decoration: underline;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-family: inherit;
      font-weight: 500;
      background: var(--sage);
      color: #fff;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #798C79; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139,157,139,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--brown-lt);
    }
    .auth-footer a {
      color: var(--sage);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(253,251,249,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,157,139,0.12);
      border-radius: 12px;
      padding: 12px 24px;
      box-shadow: 0 8px 32px rgba(93,78,55,0.12);
      font-size: 14px;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: #D47A84; }
    .toast.success { border-color: var(--sage); }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.4;
      padding: 2px;
      font-family: inherit;
    }
    .password-toggle:hover { opacity: 0.7; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><span>🌿</span><span>树洞情绪站</span></a>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="login" onclick="switchTab('login')">登录</button>
        <button class="tab" data-tab="register" onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>邮箱</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="至少 6 位" minlength="6" required>
            <button type="button" class="password-toggle" onclick="togglePwd('loginPassword',this)" tabindex="-1">👁</button>
          </div>
          <div class="form-error" id="loginError"></div>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">登录 <span>→</span></button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regUsername" placeholder="给自己起个名字" minlength="2" maxlength="30" required>
          </div>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="regEmail" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="regPassword" placeholder="至少 6 位" minlength="6" required>
            <button type="button" class="password-toggle" onclick="togglePwd('regPassword',this)" tabindex="-1">👁</button>
          </div>
          <div class="form-error" id="registerError"></div>
        </div>
        <label class="terms-checkbox">
          <input type="checkbox" id="agreeTerms">
          <span>我已阅读并同意 <a href="#" onclick="showTerms(); return false;">《服务条款》</a>和<a href="#" onclick="showPrivacyInfo(); return false;">《隐私政策》</a></span>
        </label>
        <button type="submit" class="btn-submit" id="registerBtn" disabled>注册 <span>→</span></button>
      </form>

      <div class="auth-footer">
        已有账号？<a href="#" onclick="switchTab('login'); return false;">去登录</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    function showTerms() {
      alert(
        '📋 服务条款\n\n' +
        '1. 本产品为个人情绪疏导工具，不构成任何形式的心理咨询或医疗服务。\n' +
        '2. 如你有严重的心理困扰或危机，请立即拨打心理援助热线（如：北京 010-82951332，上海 021-12320-5）或前往医疗机构。\n' +
        '3. 你同意不利用本产品进行任何违法活动。\n' +
        '4. 我们保留修改服务条款的权利，修改后的条款一经发布即生效。\n' +
        '5. 本产品按「现状」提供，不保证服务不会中断或完全准确。\n\n' +
        '继续使用即表示你接受本条款。'
      );
    }

    function showPrivacyInfo() {
      alert(
        '🔒 隐私政策\n\n' +
        '1. 我们收集的信息：用户名、邮箱（仅用于账号登录）；测评答案及结果；树洞聊天内容。\n' +
        '2. 信息用途：仅用于生成 AI 回复以及在你的个人主页展示历史记录。\n' +
        '3. 信息存储：所有数据存储在 Supabase 加密数据库中，传输使用 HTTPS 加密。\n' +
        '4. 第三方共享：AI 回复由 DeepSeek API 生成，消息内容会发送至 DeepSeek 处理，但我们不会将数据出售或分享给其他第三方。\n' +
        '5. 数据控制：你可以在个人主页随时清除所有数据或注销账号。\n' +
        '6. 建议：为了保护隐私，请不要在对话中输入真实姓名、地址、电话等可识别个人信息。\n\n' +
        '如有问题请联系管理员。'
      );
    }

    // ── Tab switch ──
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
      document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
    }

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '👁‍🗨';
    }

    // ── Toast ──
    let toastTimer = null;
    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── API helpers ──
    function setBtnLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>' : (btnId === 'loginBtn' ? '登录 <span>→</span>' : '注册 <span>→</span>');
    }

    function showError(formId, msg) {
      const el = document.getElementById(formId);
      el.textContent = msg;
      el.classList.add('show');
    }

    async function apiPost(path, body) {
      const resp = await fetch(API_BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || '请求失败');
      return data;
    }

    function afterLogin(data) {
      localStorage.setItem('treehole_token', data.token);
      localStorage.setItem('treehole_user', JSON.stringify(data.user));

      // Check if we need to redirect
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'index.html';
      window.location.href = redirect;
    }

    // ── Login ──
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      document.getElementById('loginError').classList.remove('show');

      if (!email || !password) return;

      setBtnLoading('loginBtn', true);
      try {
        const data = await apiPost('/api/auth/login', { email, password });
        showToast('登录成功 🎉', 'success');
        setTimeout(() => afterLogin(data), 400);
      } catch (err) {
        showError('loginError', err.message);
      } finally {
        setBtnLoading('loginBtn', false);
      }
    }

    // 勾选服务条款后才能注册
    document.getElementById('agreeTerms').addEventListener('change', function() {
      document.getElementById('registerBtn').disabled = !this.checked;
    });

    // ── Register ──
    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      document.getElementById('registerError').classList.remove('show');

      if (!document.getElementById('agreeTerms').checked) {
        showError('registerError', '请先阅读并同意服务条款和隐私政策');
        return;
      }

      if (!username || !email || !password) return;

      setBtnLoading('registerBtn', true);
      try {
        const data = await apiPost('/api/auth/register', { username, email, password });
        showToast('注册成功 🎉', 'success');
        setTimeout(() => afterLogin(data), 400);
      } catch (err) {
        showError('registerError', err.message);
      } finally {
        setBtnLoading('registerBtn', false);
      }
    }

    // ── Auto-redirect if already logged in ──
    if (localStorage.getItem('treehole_token')) {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'index.html';
      window.location.href = redirect;
    }
  </script>
</body>
</html>
