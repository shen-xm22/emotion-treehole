<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情人匹配图鉴 — 测测你的恋爱风格</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #faf5f2 0%, #f4ece8 50%, #efe7e3 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    color: #4a3f42;
  }
  .container { max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: 40px; }
  .card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(201, 151, 158, 0.15);
    border-radius: 22px;
    padding: 36px 28px;
    box-shadow: 0 6px 36px rgba(160, 120, 130, 0.08);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #c9979e, #dbb0ba, #e3c4cb);
    opacity: 0.5;
  }

  /* ====== Start ====== */
  #start-screen { text-align: center; padding: 50px 0 40px; }
  .logo-emoji { font-size: 80px; margin-bottom: 10px; }
  .logo-title {
    font-size: 34px; font-weight: 700;
    background: linear-gradient(135deg, #c28b93, #d4a5af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .logo-sub { color: #b0979d; font-size: 15px; margin-bottom: 30px; line-height: 1.7; }
  .btn-start {
    display: inline-block; padding: 14px 52px;
    background: linear-gradient(135deg, #c9979e, #dbb0ba);
    color: #fff;
    border: none; border-radius: 50px;
    font-size: 18px; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201, 151, 158, 0.3);
    letter-spacing: 1px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(201, 151, 158, 0.4); }
  .info-row {
    display: flex; justify-content: center; gap: 20px;
    margin: 16px 0 26px; font-size: 13px; color: #b0979d;
  }
  .info-row span { display: flex; align-items: center; gap: 4px; }

  /* ====== Question ====== */
  #question-screen { display: none; }
  .progress-container { margin-bottom: 18px; }
  .progress-bar-bg { height: 4px; background: #ede0e3; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #c9979e, #dbb0ba); border-radius: 2px; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; color: #b0979d; text-align: right; margin-top: 5px; }
  .q-badge {
    display: inline-block; padding: 3px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    background: rgba(201, 151, 158, 0.1); color: #b0808a;
    margin-bottom: 10px;
  }
  .q-hidden-badge { background: rgba(212, 165, 143, 0.15); color: #b8956d; }
  .q-scene { font-size: 15px; line-height: 1.7; color: #6b5459; margin-bottom: 12px; }
  .q-question { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; color: #4a3f42; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: block; width: 100%;
    padding: 14px 18px;
    background: #fff;
    border: 1.5px solid #e6d3d7;
    border-radius: 14px;
    color: #4a3f42;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .option-btn:hover {
    border-color: #c9979e;
    background: rgba(201, 151, 158, 0.04);
    transform: translateX(4px);
  }
  .option-btn.selected {
    border-color: #c9979e;
    background: rgba(201, 151, 158, 0.08);
    box-shadow: 0 0 0 2px rgba(201, 151, 158, 0.12);
  }
  .option-label {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #ede0e3;
    color: #b0808a;
    font-size: 12px;
    font-weight: 700;
    margin-right: 10px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn:hover .option-label { background: #e0cfd3; }
  .option-btn.selected .option-label { background: #c9979e; color: #fff; }
  .option-text { flex: 1; }
  .option-row { display: flex; align-items: flex-start; }
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px;
  }
  .btn-back {
    padding: 8px 18px; background: none;
    border: 1px solid #e6d3d7; border-radius: 50px;
    color: #b0979d; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: #c9979e; color: #c9979e; }
  .btn-back:disabled { opacity: 0.25; cursor: not-allowed; }


  /* ====== Match compatibility ====== */
  .result-match { margin: 16px 0 14px; text-align: center; }
  .result-match-title { font-size: 14px; font-weight: 700; color: #8a6d73; margin-bottom: 12px; letter-spacing: 0.5px; }
  .result-match-boxes { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .match-box {
    flex: 1; min-width: 150px; max-width: 200px;
    padding: 16px 14px 14px; border-radius: 16px;
    text-align: center;
    transition: transform 0.2s;
  }
  .match-box.primary {
    background: rgba(201, 151, 158, 0.12);
    border: 1.5px solid rgba(201, 151, 158, 0.25);
  }
  .match-box.secondary {
    background: rgba(201, 151, 158, 0.06);
    border: 1.5px solid rgba(201, 151, 158, 0.12);
  }
  .match-box-label { font-size: 10px; color: #b09095; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .match-box-emoji { font-size: 28px; display: block; margin-bottom: 2px; }
  .match-box-name { font-size: 16px; font-weight: 700; color: #4a3f42; }
  .match-box:hover { transform: translateY(-2px); }

  /* ====== Result ====== */
  #result-screen { display: none; text-align: center; }
  .result-header { text-align: center; margin-bottom: 16px; }
  .result-emoji { font-size: 72px; margin-bottom: 0; }
  .result-type {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, #c28b93, #d4a5af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-tagline {
    display: inline-block; padding: 3px 14px; border-radius: 20px;
    font-size: 13px; background: rgba(201, 151, 158, 0.1); color: #b0808a;
    margin-top: 2px;
  }
  .result-desc {
    font-size: 14px; line-height: 1.8; color: #6b5459;
    text-align: left; margin-bottom: 14px;
    padding: 14px 18px;
    background: rgba(237, 224, 227, 0.35);
    border-radius: 12px;
  }
  .result-chart-container {
    display: flex; justify-content: center;
    margin: 4px 0 0; padding: 0;
  }
  #radarChart { width: 340px; height: 340px; }
  .result-extra {
    display: flex; justify-content: center; gap: 16px;
    margin: 6px 0 14px; flex-wrap: wrap;
  }
  .extra-box {
    padding: 10px 18px;
    background: rgba(237, 224, 227, 0.25);
    border-radius: 12px; border: 1px solid #e6d3d7;
    text-align: center; min-width: 130px;
  }
  .extra-box-title { font-size: 10px; color: #b0979d; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .extra-box-value { font-size: 15px; font-weight: 600; color: #4a3f42; }
  .btn-group { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .btn-secondary {
    padding: 11px 26px;
    background: #fff; border: 1.5px solid #e6d3d7;
    border-radius: 50px; color: #4a3f42;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: #c9979e; color: #c9979e; }
  .btn-primary {
    padding: 11px 30px;
    background: linear-gradient(135deg, #c9979e, #dbb0ba);
    border: none; border-radius: 50px;
    color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(201, 151, 158, 0.2);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201, 151, 158, 0.3); }
  .result-hidden {
    border: 1px dashed #cba982;
    background: rgba(212, 165, 143, 0.08);
    padding: 10px 14px; border-radius: 10px;
    margin: 6px 0; font-size: 13px; color: #a8845e;
    display: none;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; border-radius: 18px; }
    .logo-title { font-size: 28px; }
    .logo-emoji { font-size: 64px; }
    .q-question { font-size: 15px; }
    .result-emoji { font-size: 56px; }
    .result-type { font-size: 22px; }
    #radarChart { width: 280px; height: 280px; }
    .extra-box { min-width: 110px; padding: 8px 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ====== START ====== -->
  <div id="start-screen" class="card">
    <div class="logo-emoji">💘</div>
    <div class="logo-title">情人匹配图鉴</div>
    <div class="logo-sub">
      23 道题 · 测出你的恋爱人格<br>
      情景+态度混搭，反正很准
    </div>
    <div class="info-row">
      <span>⏱️ 4-6 分钟</span>
      <span>📋 17 种结果</span>
      <span>🎲 含隐藏人格</span>
    </div>
    <button class="btn-start" onclick="startTest()">开始测试 🫶</button>
  </div>

  <!-- ====== Question ====== -->
  <div id="question-screen" class="card">
    <div class="progress-container">
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <div id="progress-text" class="progress-text">1 / 20</div>
    </div>
    <div id="q-type-badge" class="q-badge">🔥 情景题</div>
    <div id="q-scene" class="q-scene"></div>
    <div id="q-question" class="q-question"></div>
    <div id="q-options" class="options"></div>
    <div class="nav-row">
      <button id="btn-back" class="btn-back" onclick="goBack()" disabled>← 上一题</button>
      <div></div>
    </div>
  </div>

  <!-- ====== Result ====== -->
  <div id="result-screen" class="card">
    <div class="result-header">
      <div class="result-emoji" id="r-emoji">🕰️</div>
      <div class="result-type" id="r-name">老派约会选手</div>
      <div class="result-tagline" id="r-tagline">"等一封信"</div>
    </div>
    <div class="result-desc" id="r-desc"></div>
    <div id="r-hidden" class="result-hidden"></div>
    <div class="result-chart-container">
      <canvas id="radarChart" width="340" height="340"></canvas>
    </div>
    <div class="result-match">
      <div class="result-match-title">💞 人格契合推荐</div>
      <div class="result-match-boxes">
        <div class="match-box primary">
          <div class="match-box-label">🌟 最佳契合</div>
          <span class="match-box-emoji" id="r-match-best-emoji"></span>
          <div class="match-box-name" id="r-match-best"></div>
        </div>
        <div class="match-box secondary">
          <div class="match-box-label">✨ 次佳契合</div>
          <span class="match-box-emoji" id="r-match-second-emoji"></span>
          <div class="match-box-name" id="r-match-second"></div>
        </div>
      </div>
    </div>
    <div class="result-extra">
      <div class="extra-box">
        <div class="extra-box-title">🎭 你可能也接近</div>
        <div class="extra-box-value" id="r-second"></div>
      </div>
      <div class="extra-box">
        <div class="extra-box-title">🔁 你的反面</div>
        <div class="extra-box-value" id="r-opposite"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-secondary" onclick="retake()">🔄 再测一次</button>
      <button class="btn-primary" onclick="showShare()">📤 分享结果</button>
    </div>
  </div>

</div>

<script>
// ================================================================
// DIMENSIONS
// ================================================================
const DIM_NAMES = {
  T1:'节奏偏好', T2:'投入方式', T3:'确认需求',
  D1:'独立需求', D2:'情感交融', D3:'社交边界',
  E1:'表达方式', E2:'安全感来源', E3:'冲突处理',
  M1:'关系态度', M2:'专一度', M3:'未来导向',
  R1:'关系角色', R2:'情绪主导', R3:'自我风格'
};
const DIM_CODES = Object.keys(DIM_NAMES);
const DIM_SHORT = {
  T1:'节奏', T2:'投入', T3:'名分',
  D1:'独立', D2:'交融', D3:'边界',
  E1:'表达', E2:'安全', E3:'冲突',
  M1:'态度', M2:'专一', M3:'未来',
  R1:'角色', R2:'情绪', R3:'自我'
};

// ================================================================
// PERSONALITY TYPES (17)
// ================================================================
const TYPES = [
  { id:1, emoji:"🕰️", name:"老派约会选手", tagline:"等一封信",
    desc:"别人在 app 上滑到手指抽筋，你还在等一个顺其自然的相遇。你不是跟不上时代，你只是觉得感情这回事，慢一点才看得清。消息你也会回，但比起满屏的「在干嘛」，你更想有人坐下来跟你好好吃顿饭。这个时代确实对你不太友好，但你这样的人，遇到那个对的人的时候，一出手就是王炸。",
    vector:{ T1:1.5, T2:-1.5, T3:2, D1:0, D2:-0.5, D3:0, E1:-1.5, E2:0, E3:-0.5, M1:1.5, M2:2, M3:2, R1:0.5, R2:-0.5, R3:-0.5 } ,
    bestMatch:16, secondMatch:7 },{ id:2, emoji:"🔥", name:"Situationship 王者", tagline:"别问在干嘛",
    desc:"暧昧是你的舒适区——被问「我们是什么关系」的时候你的大脑直接蓝屏。你不是不想负责，你只是觉得现在这样就挺好的：有话聊、有期待、不用吵架谁洗碗。你嘴上说喜欢不确定性，其实你只是害怕一段关系变成责任之后就走样了。行吧，但偶尔也可以问问自己：你是真喜欢这种状态，还是在等一个让你愿意确定的人？",
    vector:{ T1:-1, T2:0.5, T3:-2, D1:1, D2:0, D3:-1, E1:0.5, E2:0, E3:-0.5, M1:-1.5, M2:-1, M3:-1.5, R1:0, R2:0.5, R3:0.5 } ,
    bestMatch:3, secondMatch:9 },{ id:3, emoji:"🪭", name:"并行恋爱选手", tagline:"多线不渣人",
    desc:"你的原则很清晰：没确定之前大家都是自由的。ABCD 你都在认真聊，你说这叫信息搜集阶段，不叫养鱼。效率确实高，但小心别聊串了——那天你对着 A 说了 B 的口头禅，场面一度非常尴尬。不过说真的，哪天你遇到一个让你心甘情愿关掉其他窗口的人，那才是真·你赢了。",
    vector:{ T1:-1.5, T2:0.5, T3:-1.5, D1:1, D2:-0.5, D3:-1, E1:0, E2:-0.5, E3:-0.5, M1:-1.5, M2:-2, M3:-1, R1:0, R2:0, R3:1 } ,
    bestMatch:2, secondMatch:9 },{ id:4, emoji:"🐙", name:"贴贴怪", tagline:"别走抱紧我",
    desc:"你的恋爱核心需求就是：贴在一起。消息要秒回，周末要见面，睡前要打电话。你从来不觉得黏人是缺点——爱一个人就是想跟她/他一直在一起啊。你的世界很小，但里面全是 TA。",
    vector:{ T1:0.5, T2:1.5, T3:1, D1:-2, D2:2, D3:2, E1:2, E2:1.5, E3:1, M1:0.5, M2:1.5, M3:1, R1:-0.5, R2:1.5, R3:0.5 } ,

    vector:{ T1:-0.5, T2:-1, T3:-0.5, D1:2, D2:-2, D3:-2, E1:-1, E2:-1, E3:0, M1:0, M2:1, M3:0.5, R1:-0.5, R2:-0.5, R3:-1.5 } ,

    desc:"你对自己的恋爱没有太多预设。来什么人、什么节奏、什么模式——你都随缘。你不强求结果，也不纠结过程。有人找你聊天就聊，有人约你就去，没有就算了。与其说你在谈恋爱，不如说你在被恋爱谈。但这也没什么不好，你过得很轻松。",
    vector:{ T1:0, T2:0, T3:0, D1:0, D2:0, D3:0, E1:0, E2:-0.5, E3:0, M1:-0.5, M2:0, M3:-0.5, R1:0, R2:0, R3:0 } ,

// ================================================================
let state = {};
function initState() {
  state = {
    scores: {}, answers: {}, questionHistory: [],
    hiddenProb: 0, hiddenActive: false, hiddenAnswered: 0, usedHidden: false,
    currentQIdx: 0, questionOrder: [],
    answeredHidden: false // whether user ever got to hidden questions this run
  };
  DIM_CODES.forEach(d => state.scores[d] = 0);
  state.questionOrder = QUESTIONS.filter(q => !q.hidden).map(q => q.id);
}
const LABELS = ['A','B','C','D'];

// ================================================================
// UI
// ================================================================
function startTest() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('question-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  initState();
  renderQuestion();
}

function renderQuestion() {
  if (state.currentQIdx >= state.questionOrder.length) {
    if (!state.usedHidden && shouldShowHidden()) {
      state.usedHidden = true; state.hiddenActive = true;
      state.hiddenAnswered = 0; state.hiddenProb = 0;
      state.questionOrder = state.questionOrder.concat([21,22,23]);
      renderQuestion(); return;
    }
    showResult(); return;
  }

  const qId = state.questionOrder[state.currentQIdx];
  const q = QUESTIONS.find(x => x.id === qId);
  if (!q) { state.currentQIdx++; renderQuestion(); return; }

  const total = state.questionOrder.length;
  const pct = total > 0 ? (state.currentQIdx / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (state.currentQIdx + 1) + ' / ' + total;

  const badge = document.getElementById('q-type-badge');
  if (q.hidden) {
    badge.textContent = '🎲 隐藏题'; badge.className = 'q-badge q-hidden-badge';
  } else if (q.badge === '💭') {
    badge.textContent = '💭 态度题'; badge.className = 'q-badge';
  } else {
    badge.textContent = '🔥 情景题'; badge.className = 'q-badge';
  }

  document.getElementById('q-scene').textContent = q.scene || '';
  document.getElementById('q-question').textContent = q.hidden ? '' : (q.id >= 12 && q.id <= 16 ? '你的选择是？' : '你会怎么选？');

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (state.answers[qId] === i) btn.classList.add('selected');
    btn.innerHTML = '<div class="option-row"><span class="option-label">'+LABELS[i]+'</span><span class="option-text">'+opt.text+'</span></div>';
    btn.onclick = () => selectOption(qId, i, opt);
    optContainer.appendChild(btn);
  });

  // Back button
  document.getElementById('btn-back').disabled = (state.currentQIdx === 0);
}

function selectOption(qId, optIdx, opt) {
  state.answers[qId] = optIdx;
  if (opt.effects) Object.keys(opt.effects).forEach(d => {
    if (state.scores[d] !== undefined) state.scores[d] += opt.effects[d];
  });

  // Hidden question logic
  if (qId === 21) {
    if (opt.hiddenFlag === 'stop') { state.currentQIdx = state.questionOrder.length; showResult(); return; }
    if (opt.hiddenFlag === 'continue') state.hiddenAnswered++;
  }
  if (qId === 22) { state.hiddenProb += (opt.hiddenFlag||0); state.hiddenAnswered++; }
  if (qId === 23) { state.hiddenProb += (opt.hiddenFlag||0); state.hiddenAnswered++; }

  // Visually select
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  const btns = document.querySelectorAll('.option-btn');
  if (btns[optIdx]) btns[optIdx].classList.add('selected');

  setTimeout(() => { state.currentQIdx++; renderQuestion(); }, 260);
}

function goBack() {
  if (state.currentQIdx <= 0) return;
  state.currentQIdx--;
  const qId = state.questionOrder[state.currentQIdx];
  if (state.answers[qId] === undefined) { renderQuestion(); return; }

  const q = QUESTIONS.find(x => x.id === qId);
  const optIdx = state.answers[qId];
  const opt = q.options[optIdx];

  // Undo effects
  if (opt.effects) Object.keys(opt.effects).forEach(d => {
    if (state.scores[d] !== undefined) state.scores[d] -= opt.effects[d];
  });
  // Undo hidden flags
  if (qId === 22) state.hiddenProb -= (opt.hiddenFlag||0);
  if (qId === 23) state.hiddenProb -= (opt.hiddenFlag||0);
  if (qId === 22 || qId === 23) state.hiddenAnswered--;

  delete state.answers[qId];

  // If going back past hidden trigger, recalc
  if (qId <= 11 && state.usedHidden) {
    recalcHiddenAfterBacktrack();
  }

  renderQuestion();
}

function recalcHiddenAfterBacktrack() {
  state.usedHidden = false; state.hiddenActive = false;
  state.hiddenAnswered = 0; state.hiddenProb = 0;
  // Remove hidden Qs from order
  state.questionOrder = state.questionOrder.filter(id => id < 21);
  [21,22,23].forEach(hid => delete state.answers[hid]);
}

function shouldShowHidden() {
  return state.answers[2] === 1 && state.answers[11] === 1;
}

// ================================================================
// RESULT
// ================================================================
function showResult() {
  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const norm = {};
  DIM_CODES.forEach(d => norm[d] = Math.max(-2, Math.min(2, state.scores[d] || 0)));

  let isHidden = state.hiddenProb >= 70;
  let mainType, secondType, oppositeType;

  if (isHidden) {
    mainType = HIDDEN_TYPE;
    const r = findClosestTypes(norm, TYPES);
    secondType = r.second; oppositeType = r.opposite;
  } else {
    const r = findClosestTypes(norm, TYPES);
    mainType = r.main; secondType = r.second; oppositeType = r.opposite;
  }

  document.getElementById('r-emoji').textContent = mainType.emoji;
  document.getElementById('r-name').textContent = mainType.name;
  document.getElementById('r-tagline').textContent = '"' + mainType.tagline + '"';
  document.getElementById('r-desc').textContent = mainType.desc;
  document.getElementById('r-second').textContent = secondType ? secondType.emoji + ' ' + secondType.name : '—';
  document.getElementById('r-opposite').textContent = oppositeType ? oppositeType.emoji + ' ' + oppositeType.name : '—';

  // Populate match recommendations
  const bmType = TYPES.find(t => t.id === mainType.bestMatch);
  const smType = TYPES.find(t => t.id === mainType.secondMatch);
  document.getElementById('r-match-best-emoji').textContent = bmType ? bmType.emoji : '';
  document.getElementById('r-match-best').textContent = bmType ? bmType.name : '—';
  document.getElementById('r-match-second-emoji').textContent = smType ? smType.emoji : '';
  document.getElementById('r-match-second').textContent = smType ? smType.name : '—';

  const h = document.getElementById('r-hidden');
  if (isHidden) { h.style.display = 'block'; h.textContent = '🎲 你触发了隐藏人格！只有特定路径才会出现。'; }
  else h.style.display = 'none';

  drawRadar(norm, mainType.id === 99 ? null : mainType);
}

function findClosestTypes(userVec, typeList) {
  let results = typeList.map(t => {
    let dist = 0;
    DIM_CODES.forEach(d => { const diff = (userVec[d]||0) - (t.vector[d]||0); dist += diff*diff; });
    return { type:t, dist:Math.sqrt(dist) };
  });
  results.sort((a,b) => a.dist - b.dist);
  return { main:results[0].type, second:results[1]?.type||null, opposite:results[results.length-1].type };
}

// ================================================================
// RADAR CHART
// ================================================================
function drawRadar(userVec, mainType) {
  const canvas = document.getElementById('radarChart');
  const container = canvas.parentElement;
  const maxSize = Math.min(container.clientWidth || 340, 400);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = maxSize * dpr;
  canvas.height = maxSize * dpr;
  canvas.style.width = maxSize + 'px';
  canvas.style.height = maxSize + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const cx = maxSize/2, cy = maxSize/2 + 4;
  const radius = Math.min(cx, cy) - 36;
  const n = DIM_CODES.length;
  const angleStep = (Math.PI*2)/n;
  const startAngle = -Math.PI/2;

  ctx.clearRect(0, 0, maxSize, maxSize);

  // Grid rings
  [0.5, 1.0, 1.5, 2.0].forEach(level => {
    const r = radius * (level/2);
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = startAngle + i*angleStep;
      const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(201, 151, 158, 0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Axis lines
  ctx.strokeStyle = 'rgba(201, 151, 158, 0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i < n; i++) {
    const a = startAngle + i*angleStep;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius*Math.cos(a), cy + radius*Math.sin(a));
    ctx.stroke();
  }

  // Type template (dashed gold)
  if (mainType) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const dim = DIM_CODES[i % n];
      const val = (mainType.vector[dim]||0)/2;
      const r = radius * ((val+1)/2);
      const a = startAngle + (i%n)*angleStep;
      const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.setLineDash([3,3]);
    ctx.strokeStyle = 'rgba(185, 149, 109, 0.4)';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.setLineDash([]);
  }

  // User data polygon
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const dim = DIM_CODES[i % n];
    const val = (userVec[dim]||0)/2;
    const r = radius * ((val+1)/2);
    const a = startAngle + (i%n)*angleStep;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(201, 151, 158, 0.15)';
  ctx.fill();
  ctx.strokeStyle = '#c9979e';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dots
  for (let i = 0; i < n; i++) {
    const dim = DIM_CODES[i];
    const val = (userVec[dim]||0)/2;
    const r = radius * ((val+1)/2);
    const a = startAngle + i*angleStep;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fillStyle = '#c9979e'; ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#b0979d';
  ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const labelR = radius + 15;
    const a = startAngle + i*angleStep;
    const lx = cx + labelR*Math.cos(a), ly = cy + labelR*Math.sin(a);
    let ox = 0, oy = 0;
    if (Math.abs(Math.cos(a)) > 0.9) ox = Math.sign(Math.cos(a)) * 2;
    if (Math.abs(Math.sin(a)) > 0.9) oy = Math.sign(Math.sin(a)) * 2;
    ctx.fillText(DIM_SHORT[DIM_CODES[i]], lx+ox, ly+oy);
  }

  // Legend
  ctx.textAlign = 'left';
  ctx.font = '10px -apple-system, "PingFang SC", sans-serif';
  ctx.fillStyle = '#c9979e';
  ctx.fillRect(maxSize-108, 8, 8, 8);
  ctx.fillText('你', maxSize-96, 15);
  if (mainType) {
    ctx.fillStyle = 'rgba(185, 149, 109, 0.6)';
    ctx.fillRect(maxSize-108, 22, 8, 8);
    ctx.fillText('类型', maxSize-96, 29);
  }
}

function retake() { startTest(); }
function showShare() {
  const e = document.getElementById('r-emoji').textContent;
  const n = document.getElementById('r-name').textContent;
  const t = document.getElementById('r-tagline').textContent;
  const text = '我测出了「' + e + ' ' + n + '」' + t + '\n\n来测测你的恋爱风格 → 情人匹配图鉴 🫶';
  if (navigator.share) { navigator.share({ title:'情人匹配图鉴', text:text }); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(()=>{alert('结果已复制到剪贴板！📤');}); }
  else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('结果已复制到剪贴板！📤');
  }
}
